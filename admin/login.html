<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="../Images/plume.png">
  <title>Connexion — Univers Caresse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f9f7f4; font-family: 'DM Sans', sans-serif; }
    .wrap { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 480px; padding: 40px 20px; position: relative; }
    .admin-label { position: absolute; top: 40px; left: 20px; font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: #d4a445; }
  .logo { width: 280px; margin-bottom: 32px; }
    .separateur { width: 100%; height: 1px; background: #d4a445; margin-bottom: 32px; }
    .row { display: flex; width: 100%; gap: 0; }
    .champ { flex: 1; padding: 12px 16px; border: 1px solid #ccc; border-right: none; border-radius: 4px 0 0 4px; font-family: 'DM Sans', sans-serif; font-size: 1rem; background: #fff; outline: none; }
    .champ:focus { border-color: #5a8a3a; }
    .btn { padding: 12px 20px; background: #5a8a3a; color: #f9f7f4; border: none; border-radius: 0 4px 4px 0; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; letter-spacing: 0.08em; cursor: pointer; white-space: nowrap; }
    .btn:hover { background: #4a6e2e; }
    .erreur { margin-top: 8px; color: #c44536; font-size: 0.85rem; min-height: 20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="admin-label">Administration</p>
    <img src="../Images/Logofinal.png" alt="Univers Caresse" class="logo">
    <div class="separateur"></div>
    <div class="row">
      <input type="password" id="input-mdp" class="champ">
      <button class="btn" onclick="valider()">ENTRER →</button>
    </div>
    <p id="erreur-mdp" class="erreur"></p>
  </div>

  <script>
    if (sessionStorage.getItem('uc_admin') === 'true') {
      window.location.href = '/univers-caresse/admin/';
    }
    function valider() {
      const mdp = document.getElementById('input-mdp').value;
      if (mdp === '2026') {
        sessionStorage.setItem('uc_admin', 'true');
        window.location.href = '/univers-caresse/admin/';
      } else {
        document.getElementById('erreur-mdp').textContent = 'Mot de passe incorrect.';
        document.getElementById('input-mdp').value = '';
        document.getElementById('input-mdp').focus();
      }
    }
    document.getElementById('input-mdp').addEventListener('keydown', e => {
      if (e.key === 'Enter') valider();
    });
  </script>
</body>
</html>
