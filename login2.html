<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="Images/plume.png">
  <title>Connexion — Univers Caresse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style2.css">
</head>
<body class="login-body">
  <div class="login-wrap">
    <p class="login-label">Administration</p>
    <img src="Images/Logofinal.png" alt="Univers Caresse" class="login-logo">
    <div class="login-sep"></div>
    <div class="login-row">
      <input type="password" id="input-mdp" class="form-ctrl login-champ" placeholder="Mot de passe">
      <button class="btn btn--primaire login-btn" onclick="valider()">ENTRER →</button>
    </div>
    <p id="erreur-mdp" class="form-erreur"></p>
  </div>

  <script>
    if (sessionStorage.getItem('uc_admin') === 'true') {
      window.location.href = 'index2.html';
    }
    function valider() {
      const mdp = document.getElementById('input-mdp').value;
      if (mdp === '2026') {
        sessionStorage.setItem('uc_admin', 'true');
        window.location.href = 'index2.html';
      } else {
        document.getElementById('erreur-mdp').textContent = 'Mot de passe incorrect.';
        document.getElementById('input-mdp').value = '';
        document.getElementById('input-mdp').focus();
      }
    }
    document.getElementById('input-mdp').addEventListener('keydown', e => {
      if (e.key === 'Enter') valider();
    });
  </script>
</body>
</html>
